<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Belajar WEB</title>

    <style>
        body {
            background-color: seagreen;
            color: rosybrown; /*color ayat*/
            font-family: 'Courier New', Courier, monospace;           
            text-align: center;
            padding-top: 30px;
        }
        h1{
            color:silver;
            font-size : 30px;
        }
        p{
            font-size : 18px;
            color: black;
            margin-bottom: 20px;
        }

        button {
            background-color: black;
            color: wheat;
            border: none;
            padding: 12px 24px;
            font-size : 16px;
            font-weight : bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover{
            background-color: silver; /*if button kat button*/
        }
        /*pofil me*/
        .kad-profil{
            background-color: silver;
            width: 350px;
            margin: 40px auto;
            padding : 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .kad-profil img {
            border-radius: 50%;
            border: 3px solid #b623d5;
            margin-bottom: 15px;
        }
        .kad-profil .jawatan{
            color: black;
            font-weight: bold;
            text-transform : uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* menu bar atas*/
        .menu-bar {
            background-color: silver;
            position: fixed;
            padding: 15px;
            top: 0;
            left: 0;
            width : 100%;

            display:flex;
            justify-content: center;
            gap: 30px;
        }
        .menu-bar a{
            color: black;
            text-decoration : none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }
        .menu-bar a:hover{
            color: hotpink;
        }

        /*Untuk pelabagai saiz screen*/
        @media(max-width:600px)
        {
            /*adjust body/page */
            body{
                padding-top: 80px;

            }
            /*saiz tjuk utama*/
            h1{
                font-size: 28px;
            }
            /* tukar kotak profil muat2 pada phone*/
            .kad-profil{
                width: 85%;  /*tukar guna percvent, jdi dye auto lebar phone*/
                padding: 15px;
            }
        }

    </style>

</head>
<body>
    <!--HTML: Struktur Utama-->
    <h1>LANGKAH BELAJAR BALIK</h1>
    <p>Jap warm Up</p>

    <button id="butangcuba">Klik Sini</button>

    <!--HTML: Kad profil-->
    <div class="kad-profil">
        <img src="https://picsum.photos/150" alt="Profil Gambar" />
        <h2>Abang developer</h2>
        <p class="jawatan">Web developer</p>
        <p> Tengah Uppgrade diri</p>

    </div>
    <!--HTML: MENU -->
    <div class="menu-bar">
        <a href="index.html">Utama</a>
        <a href="profil.html">PROFIL</a>
        <a href="projek.html">Project</a>
    </div>



    <!--JAVASCRIPT : OTAK KASI WEB FUNCTION-->
    <script>

        const butang = document.getElementById('butangcuba');
        butang.addEventListener('click', function (){
        alert('Fuh mantap');

        });



    </script>

</body>
</html>
